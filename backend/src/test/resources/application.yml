# Suprascrie proprietăți fără fallback din application.yml (prod), doar pentru teste — ex.
# app.cors.allowed-origins (APP_CORS_ALLOWED_ORIGINS), care intenționat NU are valoare implicită
# pe profilul prod. Testele nu pornesc pe profilul dev, deci au nevoie de propria valoare.
app:
  cors:
    allowed-origins: http://localhost:3001
  jwt:
    secret: test-secret-doar-pentru-teste-minim-32-caractere-lungime
    access-token-ttl-minutes: 15
  auth:
    refresh-token-ttl-days: 30
    refresh-cookie-name: rp_refresh
    refresh-cookie-same-site: Lax
    rate-limit:
      # Relaxat doar în teste — mai multe clase de integrare rulează zeci de register/login din
      # același „IP" (localhost) în aceeași fereastră; pragul de producție (10/min) rămâne în cod.
      max-requests: 1000
