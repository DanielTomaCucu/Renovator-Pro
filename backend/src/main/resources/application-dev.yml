# Profil de dezvoltare locală. Rulează cu: --spring.profiles.active=dev
# DB pornit din backend/docker-compose.yml (Postgres pe portul 5433).
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/renovatorpro
    username: renovatorpro
    password: renovatorpro
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: http://localhost:3001
  jwt:
    # Fallback DOAR pe dev — pe prod JWT_SECRET e obligatoriu din env (vezi application.yml). ≥32 caractere (256 biți).
    secret: ${JWT_SECRET:dev-secret-nu-il-folosi-niciodata-in-productie-32chars}
  auth:
    refresh-cookie-same-site: Lax
  frontend:
    base-url: ${APP_FRONTEND_URL:http://localhost:3001}
  email:
    # Fallback DOAR pe dev — fără cheie, ResendPasswordResetEmailSender scrie linkul în log în loc să trimită email.
    resend-api-key: ${RESEND_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Documentația API vizibilă local la http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
