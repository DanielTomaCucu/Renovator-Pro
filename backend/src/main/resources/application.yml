spring:
  application:
    name: renovator-pro-backend
  # Profilul implicit e „safe pentru prod": totul din variabile de mediu, fără valori hardcodate.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      # NICIODATĂ „update" în afara testelor — schema e gestionată exclusiv de Flyway.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

app:
  # Fără fallback intenționat — pe prod, domeniul Vercel real trebuie setat explicit (niciodată wildcard `*`).
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  # Faza 5 — fără fallback intenționat: secretul JWT trebuie setat explicit pe prod (niciodată în git).
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-minutes: 15
  auth:
    refresh-token-ttl-days: 30
    refresh-cookie-name: rp_refresh
    # Vercel (frontend) și Render (backend) sunt origini diferite — cookie-ul cross-site are nevoie de
    # SameSite=None (+ Secure, setat direct la construirea cookie-ului în AuthController). Pe dev,
    # application-dev.yml suprascrie cu Lax (localhost:3001 → localhost:8080 nu e „cross-site" real).
    refresh-cookie-same-site: None

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Swagger/OpenAPI dezactivat implicit — activat doar pe profilul dev (vezi application-dev.yml).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
