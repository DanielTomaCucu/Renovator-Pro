name: Keep-alive Render

# KEEP-1 (docs/cerinte-keepalive-render.md): ping /actuator/health la fiecare 10 min, doar în
# fereastra 08:00–21:00 Europe/Bucharest, ca serviciul Render (free tier, spin-down după 15 min
# de inactivitate) și DB-ul Supabase (pauză după ~7 zile fără activitate) să rămână treze pe
# durata zilei. Aritmetică: 13h/zi × 31 zile ≈ 403h/lună din plafonul de 750h instance-hours —
# NU extinde fereastra la 24/7 (744h/lună, zero marjă).
#
# Limitări cunoscute (acceptate):
# - Cron-ul GitHub nu e punctual — un gap ocazional > 15 min e posibil (serviciul ațipește o
#   dată, următorul ping îl trezește). Nu coborî sub */10 din cauza asta.
# - GitHub dezactivează schedule-urile după 60 de zile fără activitate în repo — reactivare
#   manuală din Actions → acest workflow → Enable workflow, dacă se întâmplă.

on:
  schedule:
    # UTC — acoperă fereastra locală 08:00–21:00 atât pe ora de vară (UTC+3) cât și pe cea de
    # iarnă (UTC+2); gardul de mai jos restrânge la fereastra EXACTĂ, indiferent de DST.
    - cron: "*/10 4-19 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Verifică fereastra orară locală (Europe/Bucharest)
        id: window
        run: |
          HOUR=$(TZ=Europe/Bucharest date +%H)
          echo "Ora locală curentă: $HOUR"
          if [ "$HOUR" -lt 8 ] || [ "$HOUR" -ge 21 ]; then
            echo "in_window=false" >> "$GITHUB_OUTPUT"
          else
            echo "in_window=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping /actuator/health
        if: steps.window.outputs.in_window == 'true'
        run: |
          if [ -z "${RENDER_APP_URL}" ]; then
            echo "::error::Variabila RENDER_APP_URL nu e setată (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          # --max-time 90: primul ping al zilei poate prinde cold-start-ul (~1 min) — nu trebuie să pice.
          curl --fail --silent --show-error --max-time 90 --retry 2 "${RENDER_APP_URL}/actuator/health"
        env:
          RENDER_APP_URL: ${{ vars.RENDER_APP_URL }}
